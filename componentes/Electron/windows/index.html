<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Info Remates - Principal</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../../../css/styles.css">
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h1 class="text-2xl font-semibold text-center mb-6">Info Remates</h1>
        
        <!-- Botones para abrir otras ventanas -->
        <div class="space-y-4">
            <button id="openSearchWindow" 
                    class="w-full bg-green-500 text-white p-3 rounded hover:bg-green-600">
                📋 Buscar remates
            </button>
            
            <button id="openSingleCaseWindow" 
                    class="w-full bg-blue-500 text-white p-3 rounded hover:bg-blue-600">
                🔍 Consulta de Causa Única
            </button>
            
            <button id="openExcelWindow" 
                    class="w-full bg-purple-500 text-white p-3 rounded hover:bg-purple-600">
                📊 Completar Información Excel
            </button>

            <button id="openLadrillero" 
                    class="w-full bg-purple-500 text-white p-3 rounded hover:bg-purple-600">
                🧱 Ladrillero
            </button>
            
            <button id="openSettingsWindow" 
                    class="w-full bg-gray-500 text-white p-3 rounded hover:bg-gray-600">
                ⚙️ Configuración
            </button>
        </div>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            Versión 1.0.0
        </div>

    </div>

        <!-- Modal de espera -->
    <div id="waitingModalProcess" class="view">
        <div class="modal-container">
          <h3 id="waitingMessage">Por favor espera...</h3>
          <div class="spinner-container">
            <div class="spinner"></div>
          </div>
          <p id="countdown"><span id="seconds"></span></p>
        </div>
    </div>

    <div id="ladrilloWaitingModalProcess" class="modal" style="display: none;">
        <div class="modal-content">
          <div class="modal-header">
            <div class ="span-container">
              <span class="text-xl font-bold">Trabajando...</span>
            </div>
          </div>
          <div class="modal-body">
            <div class="progress-container">
              <div id="progressBar" class="progress-bar" style="width: 0%;">0%</div>
            </div>
            <div id="modalContent" class="modal-content-scroll">
              <!-- Mensajes de progreso aparecerán aquí -->
            </div>
          </div>
        </div>
      </div>
 <script src="../prod/renderer.js"></script>
</body>
</html>
