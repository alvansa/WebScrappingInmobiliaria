
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Info Remates</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../../../css/styles.css">
  </head>

  <body class="bg-gray-100 flex justify-center items-center h-screen">
  <div id="mainView" class="view active">

    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-lg">
      <h1 class="text-2xl font-semibold text-center mb-6">Buscar remates descartados por deuda</h1>
    
      <div class="mb-4 flex gap-2">
        <input type="date" id="endDate" class="border p-2 rounded w-1/2">
        <button id="buscarDeuda" class="w-1/2 bg-green-500 text-white p-2 rounded hover:bg-green-600">
          Buscar Deuda
        </button>
      </div>
    
    </div>
  </div>
  
  <script src="../renderer/buscarDeudaRenderer.js"></script>
  <script>
    function switchView(viewId) {
      // Oculta todas las vistas
      document.querySelectorAll('.view').forEach(view => {
        view.classList.remove('active');
      });
      // Muestra la vista seleccionada
      document.getElementById(viewId).classList.add('active');
    }
  </script>
</body>
</html>
